services:
  job-analysis:
    build: .
    container_name: job-analysis
    ports:
      - "5000:5000"
    volumes:
      # SQLite 数据持久化（宿主机采集 data.db → 容器读）
      - ./data.db:/app/data.db
    env_file:
      # 可选：配置 DEEPSEEK_API_KEY
      - .env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
