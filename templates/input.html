{% extends "base.html" %}
{% block content %}

<div class="fade-up" style="text-align:center; padding:40px 0 26px;">
    <div class="stamp" style="margin:0 auto 22px;">COSINE</div>
    <p class="eyebrow">Recruitment Intelligence Ledger · 案卷 2026-PY</p>
    <h1 style="font-size:32px;">招聘信息实时数据分析系统</h1>
</div>

<div class="card fade-up" data-no="NO. 01 · 查询 / 采集入口" style="max-width:480px; margin:30px auto;">
    <form id="mainForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>岗位名称(支持关键词搜索,非精确匹配)</label>
            <input type="text" class="form-control" name="kw" placeholder="python 开发工程师" autofocus>
        </div>
        <div class="form-group">
            <label>城市(可选,多个用逗号分隔)</label>
            <input type="text" class="form-control" name="city" placeholder="例如: 北京,上海,杭州">
        </div>
        <div class="form-group">
            <label>实时采集页数(仅"立即实时采集"生效,1~5)</label>
            <input type="number" class="form-control" name="pages" value="2" min="1" max="5" style="max-width:120px;">
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" formaction="/list" formmethod="get"
                    class="btn btn-default" style="flex:1;">查询已有数据</button>
            <button type="submit" formaction="/collect" formmethod="post"
                    class="btn btn-info" style="flex:1;">立即实时采集</button>
        </div>
        <p style="color:var(--ink-soft); font-size:12px; margin-top:10px; margin-bottom:0;">
            "查询已有数据"立即返回数据库里现有的结果;"立即实时采集"会真实连接51job,
            通常需要10~60秒,会清空旧数据换成这次采集的新结果。
        </p>
    </form>
</div>

<div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:6px;">
    <a href="/chart" class="btn btn-default">查看可视化图表 →</a>
    <a href="/ml" class="btn btn-default">机器学习分析 →</a>
    <a href="/advice" class="btn btn-default">问问求职建议 Agent →</a>
</div>

{% endblock %}
